name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Expo CLI
        run: npm install -g @expo/cli

      - name: Install dependencies
        working-directory: ./comandas-app
        run: npm install

      - name: Expo Prebuild
        working-directory: ./comandas-app
        env:
          EXPO_NO_GIT_STATUS: 1
        run: npx expo prebuild --platform android --clean

      - name: Fix newArchEnabled
        working-directory: ./comandas-app
        run: |
          sed -i 's/"newArchEnabled": true/"newArchEnabled": false/' app.json
          echo "app.json newArchEnabled fixed"

      - name: Patch ReactNativeFeatureFlags.kt
        working-directory: ./comandas-app
        run: |
          FILE=$(find android -name "ReactNativeFeatureFlags.kt" 2>/dev/null | head -1)
          if [ -n "$FILE" ]; then
            sed -i 's/override fun commonTestFlags/\/\/ override fun commonTestFlags/' "$FILE"
            echo "Patched: $FILE"
          else
            echo "ReactNativeFeatureFlags.kt not found, skipping"
          fi

      - name: Setup Gradle permissions
        working-directory: ./comandas-app
        run: chmod +x android/gradlew

      - name: Configure gradle.properties
        working-directory: ./comandas-app/android
        run: |
          echo "org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m" >> gradle.properties
          echo "org.gradle.parallel=false" >> gradle.properties
          echo "org.gradle.caching=false" >> gradle.properties
          echo "kotlinVersion=2.0.21" >> gradle.properties

      - name: Build APK
        working-directory: ./comandas-app/android
        run: ./gradlew assembleRelease --no-daemon --no-parallel --max-workers=2

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: comandas-release-apk
          path: comandas-app/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: warn
