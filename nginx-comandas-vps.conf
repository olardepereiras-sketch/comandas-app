server {
    listen 80;
    listen [::]:80;
    server_name _;

    access_log /var/log/nginx/comandas-access.log;
    error_log /var/log/nginx/comandas-error.log;

    root /var/www/comandas/dist;

    # ── API tRPC directo (dev/mobile) ──────────────────────────────
    location /api/trpc/ {
        proxy_pass http://127.0.0.1:3001/api/trpc/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # ── API tRPC via proxy de quieromesa.com ───────────────────────
    # El frontend accede a /comandas-api/trpc desde quieromesa.com
    # quieromesa.com reenvía esa ruta aquí tal cual
    location /comandas-api/ {
        proxy_pass http://127.0.0.1:3001/comandas-api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # ── Health check ───────────────────────────────────────────────
    location /health {
        proxy_pass http://127.0.0.1:3001/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ── App web estática ──────────────────────────────────────────
    # Expo exporta los ficheros en dist/ con base URL /restaurant/comandas
    # Usamos alias para que /restaurant/comandas/ sirva desde dist/
    location /restaurant/comandas/ {
        alias /var/www/comandas/dist/;
        try_files $uri $uri/ /restaurant/comandas/index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Fallback: si try_files no encuentra index.html en la ruta con prefijo,
    # servir el index.html raíz del dist
    location = /restaurant/comandas/index.html {
        alias /var/www/comandas/dist/index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Assets JS/CSS con caché larga
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
        try_files $uri =404;
    }

    # Redirigir raíz al path de la app
    location = / {
        return 301 /restaurant/comandas/;
    }
}
